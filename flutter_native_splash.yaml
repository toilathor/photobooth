flutter_native_splash:
  android: true
  ios: true
  web: true

  #======================================================================
  #! FOR ALL PLATFORMS, except Android 12+:

  # General background color (commented because background_image is used):
  #color: "#5A0001"
  #color_dark: "#1C1B1F"
  #color_android: "#5A0001"
  #color_dark_android: "#1C1B1F"
  #color_ios: "#5A0001"
  #color_dark_ios: "#1C1B1F"
  #color_web: "#5A0001"
  #color_dark_web: "#1C1B1F"

  # General background image (except Android 12+):
  background_image: "assets/images/background_personal.png"
  background_image_dark: "assets/images/background_personal_dark.png"

  # Platform-specific background images:
  background_image_android: "assets/images/background_personal.png"
  background_image_dark_android: "assets/images/background_personal_dark.png"
  background_image_ios: "assets/images/background_personal.png"
  background_image_dark_ios: "assets/images/background_personal_dark.png"
  background_image_web: "assets/images/background_personal.png"
  background_image_dark_web: "assets/images/background_personal_dark.png"

  # General image (except Android 12+):
  image: "assets/images/ic_launcher.jpg"
  image_dark: "assets/images/ic_launcher.jpg"

  # Platform-specific images:
  image_android: "assets/images/ic_launcher.jpg"
  image_dark_android: "assets/images/ic_launcher.jpg"
  image_ios: "assets/images/ic_launcher.jpg"
  image_dark_ios: "assets/images/ic_launcher.jpg"
  image_web: "assets/images/ic_launcher.jpg"
  image_dark_web: "assets/images/ic_launcher.jpg"

  # Image alignment (default: center):
  android_gravity: center
  ios_content_mode: scaleAspectFit
  web_image_mode: center

  # General branding (except Android 12+):
  branding: "assets/images/branding_personal.png"
  branding_dark: "assets/images/branding_personal_dark.png"

  # Platform-specific branding:
  branding_android: "assets/images/branding_personal.png"
  branding_dark_android: "assets/images/branding_personal_dark.png"
  branding_ios: "assets/images/branding_personal.png"
  branding_dark_ios: "assets/images/branding_personal_dark.png"
  branding_web: "assets/images/branding_personal.png"
  branding_dark_web: "assets/images/branding_personal_dark.png"

  # Branding position:
  branding_mode: bottom
  branding_bottom_padding: 24
  branding_bottom_padding_android: 24
  branding_bottom_padding_ios: 24

  # Android screen orientation:
  #android_screen_orientation: sensorPortrait

  # Hide notification bar on Android (iOS handles this by default):
  fullscreen: true

  # iOS Info.plist file overrides if customized:
  #info_plist_files:
  #  - 'ios/Runner/Info-Debug.plist'
  #  - 'ios/Runner/Info-Release.plist'

  #========================================================================
  #! ANDROID 12+ configuration:
  android_12:
    color: "#5A0001"
    color_dark: "#1C1B1F"
    image: "assets/images/ic_launcher_personal_foreground.png"
    image_dark: "assets/images/ic_launcher_personal_foreground.png"
    icon_background_color: "#5A0001"
    icon_background_color_dark: "#1C1B1F"
    branding: "assets/images/branding_personal.png"
    branding_dark: "assets/images/branding_personal_dark.png"
