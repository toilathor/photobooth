name: my_photobooth
description: "A new Flutter project."
publish_to: "none"

version: 1.1.0+1

environment:
    sdk: ^3.12.0

dependencies:
    flutter:
        sdk: flutter
    flutter_localizations:
        sdk: flutter
    cupertino_icons: ^1.0.8
    camera: ^0.12.0+1
    camera_windows: ^0.2.6+2
    camera_web: ^0.3.5
    provider: ^6.0.5
    google_fonts: ^8.0.2
    gap: ^3.0.1

    googleapis: ^16.0.0
    google_sign_in: ^7.2.0
    extension_google_sign_in_as_googleapis_auth: ^3.0.0
    web: ^1.1.1
    audioplayers: ^6.6.0
    animated_text_kit: ^4.3.0
    image: ^4.8.0
    flutter_staggered_grid_view: ^0.7.0
    flutter_lints: ^6.0.0
    video_player: ^2.11.1
    path_provider: ^2.1.5
    slang: any
    slang_flutter: any
    animated_toggle_switch: ^0.8.7
    colorfilter_generator: ^0.0.8
    qr_flutter: ^4.1.0
    http: ^1.6.0
    google_sign_in_web: ^1.1.3
    google_sign_in_platform_interface: ^3.1.0
    screenshot: ^3.0.0
    responsive_framework: ^1.5.1

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_launcher_icons: ^0.14.4
    build_runner: any
    slang_build_runner: any

flutter:
    uses-material-design: true
    assets:
        - assets/sounds/
        - assets/images/
        - assets/frames/
